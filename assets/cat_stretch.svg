  <ellipse cx="175" cy="88" rx="8" ry="5" fill="#fab387"/>
  <ellipse cx="175" cy="86" rx="7" ry="3" fill="#e8956a" opacity="0.4"/>
  <ellipse cx="176" cy="89" rx="4" ry="3" fill="#1e1e2e"/>
  <circle cx="178" cy="84" r="2.5" fill="white"/>
  <circle cx="172" cy="91" r="1.5" fill="white" opacity="0.8"/>

  <!-- Open yawn mouth -->
  <ellipse cx="188" cy="100" rx="6" ry="5" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <ellipse cx="188" cy="99" rx="3.5" ry="2" fill="#45475a"/>

  <!-- Nose -->
  <path d="M 188,96 C 186,96 185,97 186,98 C 187,99 188,99 188,99
           C 188,99 189,99 190,98 C 191,97 190,96 188,96Z" fill="#f38ba8" stroke="#d4637a" stroke-width="0.5"/>

  <!-- Whiskers -->
  <g stroke="#6c7086" stroke-width="0.7" fill="none" opacity="0.5">
    <path d="M 192,98 Q 200,95 208,94"/>
    <path d="M 192,100 Q 202,100 210,100"/>
    <path d="M 192,102 Q 200,105 208,108"/>
