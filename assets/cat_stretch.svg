  <ellipse cx="62" cy="84" rx="18" ry="10" fill="#bac2de"/>
  <!-- Lower body toward head -->
  <ellipse cx="108" cy="108" rx="24" ry="16" fill="#7f849c" stroke="#45475a" stroke-width="2.2"/>
  <ellipse cx="108" cy="112" rx="16" ry="8" fill="#bac2de"/>

  <!-- Front legs extended far forward, flat on ground -->
  <path d="M 112,112 C 120,118 132,124 142,126 C 148,128 152,126 152,122" fill="#7f849c"/>
  <path d="M 138,124 C 144,126 150,126 152,122 C 152,120 150,118 146,118" fill="none" stroke="#45475a" stroke-width="1.6"/>
