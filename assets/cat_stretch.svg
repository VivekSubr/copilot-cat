  <path d="M 118,114 C 126,120 138,126 148,128 C 154,130 158,128 158,124" fill="#7f849c"/>
  <path d="M 144,126 C 150,128 156,128 158,124 C 158,122 156,120 152,120" fill="none" stroke="#45475a" stroke-width="1.6"/>
  <ellipse cx="154" cy="126" rx="8" ry="4" fill="#6c7086" stroke="#45475a" stroke-width="1.4"/>
  <circle cx="150" cy="127" r="2" fill="#f5c2e7" opacity="0.8"/>
  <circle cx="154" cy="128" r="1.6" fill="#f5c2e7" opacity="0.8"/>
  <circle cx="158" cy="127" r="2" fill="#f5c2e7" opacity="0.8"/>

  <!-- Neck fill -->
