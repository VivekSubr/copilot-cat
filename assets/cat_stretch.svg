  <path d="M 56,86 C 52,96 50,108 52,118 C 54,124 58,126 62,124" fill="#7f849c"/>
  <path d="M 52,114 C 50,120 52,124 56,126 C 60,127 64,124 64,120" fill="none" stroke="#45475a" stroke-width="1.6"/>
