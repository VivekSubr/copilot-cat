  <!-- Near ear -->
  <path d="M 168,70 Q 180,46 172,40 Q 162,52 160,68 Z" fill="#7f849c" stroke="#45475a" stroke-width="2"/>
  <path d="M 166,66 Q 174,50 170,44 Q 164,54 162,64 Z" fill="white"/>

  <!-- Head (low, near ground level) -->
